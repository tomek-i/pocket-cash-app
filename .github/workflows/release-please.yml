name: Release

# Automated versioning + changelog + Windows build, driven by Conventional Commits.
#
# How it works:
#   1. On every push to main, release-please opens (or updates) a "Release PR" that
#      bumps the version in package.json (root + apps/desktop + apps/web) and
#      regenerates CHANGELOG.md from the commit history since the last release.
#   2. Merging that PR tags `vX.Y.Z` and creates the GitHub Release with notes.
#   3. That same run then builds the Windows installer/portable/zip and attaches
#      them to the release.
#
# The build lives in THIS workflow (gated on release_created) rather than a
# separate tag-triggered one because tags/releases created by the default
# GITHUB_TOKEN do not trigger other workflows — folding it in keeps releases fully
# automatic with no personal access token required.
#
# For the same reason there is a manual `workflow_dispatch` path: it (re)builds
# the Windows artifacts from the current branch and uploads them to an EXISTING
# release tag. Use it to attach artifacts to a release whose in-line build failed
# (e.g. a build-tooling fix landed after the tag was cut).
#
# Commit messages must follow Conventional Commits (feat:, fix:, refactor:, …);
# `feat!:`/`fix!:` or a `BREAKING CHANGE:` footer bumps the major. See docs/releasing.md.

on:
  push:
    branches:
      - main
    # Docs-only pushes can never produce a release anyway (release-please only
    # bumps on feat:/fix:/breaking commits), so skip spinning the job for them.
    # A docs commit skipped here still lands in the changelog on the next code
    # push, because release-please re-scans the full history since the last tag.
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'site/**'
      - 'LICENSE'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing release tag to build and attach Windows artifacts to (e.g. v0.1.0)'
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Prepare release
    # Only the automated push flow prepares releases; manual dispatch just builds.
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: rp
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-windows:
    name: Build Windows installer
    needs: release-please
    # Run after a real release is created, OR on a manual dispatch (where the
    # release-please job is skipped, so gate on always() + the event).
    if: >-
      ${{ always() &&
      (needs.release-please.outputs.release_created == 'true'
       || github.event_name == 'workflow_dispatch') }}
    runs-on: windows-latest
    steps:
      # On dispatch, build from the branch the workflow was launched on (which has
      # any post-tag build fixes); on a release push, build the pushed commit.
      - uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Builds the web standalone bundle, flattens it, then runs electron-builder
      # (see apps/desktop/package.json "build"). Artifacts land in ./release.
      - name: Build desktop app
        run: pnpm --filter desktop build

      - name: Attach artifacts to the release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event_name == 'workflow_dispatch' && inputs.tag || needs.release-please.outputs.tag_name }}"
          shopt -s nullglob
          files=(release/*.exe release/*.zip)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No build artifacts found in ./release" >&2
            exit 1
          fi
          echo "Uploading to $TAG: ${files[*]}"
          gh release upload "$TAG" "${files[@]}" --clobber
